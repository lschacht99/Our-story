<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#153f46">
  <meta name="description" content="Hamsa Nomads: The Missing Journey — a cooperative point-and-click travel mystery.">
  <title>Hamsa Nomads: The Missing Journey</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar" aria-label="Game controls">
      <button class="brand" id="homeBtn" type="button" aria-label="Return to title">
        <img src="assets/ui/hamsa.svg" alt="" width="36" height="42">
        <span><strong>Hamsa Nomads</strong><small>The Missing Journey</small></span>
      </button>
      <button class="objective-chip" id="objectiveBtn" type="button" aria-haspopup="dialog">
        <span>Current objective</span>
        <strong id="objectiveText">Begin the journey</strong>
      </button>
      <button class="icon-btn" id="soundBtn" type="button" aria-label="Toggle sound" aria-pressed="false">♪</button>
    </header>

    <main id="screen" class="screen" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Journey menu">
      <button id="passportBtn" type="button"><span class="nav-icon">▤</span><span>Passport</span></button>
      <button id="mapBtn" type="button"><span class="nav-icon">⌁</span><span>Route</span></button>
      <button id="journalBtn" type="button"><span class="nav-icon">?</span><span>Mysteries</span></button>
      <button id="settingsBtn" type="button"><span class="nav-icon">⚙</span><span>Settings</span></button>
    </nav>
  </div>

  <dialog id="modal" class="modal">
    <div class="modal-shell">
      <button class="modal-close" id="modalClose" type="button" aria-label="Close">×</button>
      <div id="modalContent"></div>
    </div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="game.js" defer></script>
</body>
</html>
