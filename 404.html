<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#153f46">
  <meta name="description" content="Our Story — The Missing Flight: a cooperative point-and-click travel mystery starring Leah and Moshé.">
  <title>Our Story — The Missing Flight</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="assets/png/ui/app-icon.png">
  <link rel="apple-touch-icon" href="assets/png/ui/app-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <button class="brand" id="homeBtn" type="button" aria-label="Return to title screen">
        <img src="assets/png/ui/app-icon.png" alt="" width="36" height="36">
        <span><strong>Our Story</strong><small>The Missing Flight</small></span>
      </button>
      <p class="objective-chip"><span>Objective</span><strong id="objectiveText">Begin the journey</strong></p>
    </header>

    <main id="screen" class="screen" aria-live="polite">
      <div id="loading" class="loading">
        <img src="assets/png/ui/loading.png" alt="" width="120" height="180">
        <p>Unfolding the map…</p>
      </div>
    </main>

    <nav class="bottom-nav" aria-label="Journey menu">
      <button id="passportBtn" type="button"><img src="assets/png/ui/icon-passport.png" alt="" width="26" height="26"><span>Passport</span></button>
      <button id="mapBtn" type="button"><img src="assets/png/ui/icon-map.png" alt="" width="26" height="26"><span>Route</span></button>
      <button id="journalBtn" type="button"><img src="assets/png/ui/icon-notebook.png" alt="" width="26" height="26"><span>Notebook</span></button>
      <button id="bagBtn" type="button"><img src="assets/png/ui/icon-inventory.png" alt="" width="26" height="26"><span>Satchel</span></button>
      <button id="logBtn" type="button"><img src="assets/png/ui/icon-cutscene.png" alt="" width="26" height="26"><span>Log</span></button>
      <button id="settingsBtn" type="button"><img src="assets/png/ui/icon-settings.png" alt="" width="26" height="26"><span>Options</span></button>
    </nav>
  </div>

  <dialog id="modal" class="modal">
    <div class="modal-shell">
      <button class="modal-close" id="modalClose" type="button" aria-label="Close dialog">×</button>
      <div id="modalContent"></div>
    </div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="scripts/engine.js"></script>
</body>
</html>
