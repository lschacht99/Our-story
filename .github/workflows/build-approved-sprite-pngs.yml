name: Build approved sprite PNGs

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/build-approved-sprite-pngs.yml
      - assets/sprite-data/**
      - data/characters.json
      - index.html
      - sprite-fix.css
      - sw.js
  push:
    branches:
      - main
      - fix/direct-approved-sprites-v5
    paths:
      - .github/workflows/build-approved-sprite-pngs.yml
      - assets/sprite-data/**

permissions:
  contents: write

jobs:
  build-sprites:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode the approved Leah and Moshé sheets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/png/characters
          cat assets/sprite-data/leah-*.b64 | tr -d '\r\n\t ' | base64 --decode > assets/png/characters/leah-atlas.png
          cat assets/sprite-data/moshe-*.b64 | tr -d '\r\n\t ' | base64 --decode > assets/png/characters/moshe-atlas.png

      - name: Validate transparent 4 by 2 PNG atlases
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import struct

          for name in ('leah', 'moshe'):
              path = Path(f'assets/png/characters/{name}-atlas.png')
              data = path.read_bytes()
              assert data[:8] == b'\x89PNG\r\n\x1a\n', f'{name}: invalid PNG signature'
              width, height, bit_depth, color_type = struct.unpack('>IIBB', data[16:26])
              assert width >= 512 and height >= 480, f'{name}: unexpectedly small {width}x{height}'
              assert width % 4 == 0 and height % 2 == 0, f'{name}: not a 4x2 atlas'
              has_alpha = color_type in (4, 6) or (color_type == 3 and b'tRNS' in data)
              assert has_alpha, f'{name}: PNG has no transparency (type {color_type})'
              print(f'{name}: {width}x{height}, transparent PNG, {path.stat().st_size} bytes')
          PY

      - name: Commit direct runtime PNG files
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/png/characters/leah-atlas.png assets/png/characters/moshe-atlas.png
          if git diff --cached --quiet; then
            echo 'Approved direct sprite PNGs are already current.'
          else
            git commit -m 'Install approved Leah and Moshé sprite PNGs directly'
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
