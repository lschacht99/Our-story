name: Build approved sprite PNGs

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/build-approved-sprite-pngs.yml
      - data/characters.json
      - index.html
      - sprite-fix.css
      - sw.js
  push:
    branches:
      - main
      - fix/direct-approved-sprites-v5
    paths:
      - .github/workflows/build-approved-sprite-pngs.yml

permissions:
  contents: write

jobs:
  build-sprites:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download the approved transparent Leah and Moshé sheets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/png/characters
          curl --fail --location --retry 4 --retry-delay 2 \
            --output assets/png/characters/leah-atlas.png \
            'https://template.canva.com/EAG_wWzJKoc/1/0/1600w-Gn9fC7Sp2nk.png'
          curl --fail --location --retry 4 --retry-delay 2 \
            --output assets/png/characters/moshe-atlas.png \
            'https://template.canva.com/EAG_wb5xZvI/1/0/1600w-NMuz5MhG6Kk.png'
          sha256sum assets/png/characters/leah-atlas.png assets/png/characters/moshe-atlas.png

      - name: Validate transparent 4 by 2 PNG atlases
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import struct
          import zlib

          signature = b'\x89PNG\r\n\x1a\n'
          for name in ('leah', 'moshe'):
              path = Path(f'assets/png/characters/{name}-atlas.png')
              data = path.read_bytes()
              assert data.startswith(signature), f'{name}: invalid PNG signature'
              pos = 8
              width = height = color_type = None
              has_trns = False
              ended = False
              while pos + 12 <= len(data):
                  length = struct.unpack('>I', data[pos:pos+4])[0]
                  kind = data[pos+4:pos+8]
                  start = pos + 8
                  end = start + length
                  crc_end = end + 4
                  assert crc_end <= len(data), f'{name}: truncated {kind!r}'
                  payload = data[start:end]
                  expected = struct.unpack('>I', data[end:crc_end])[0]
                  actual = zlib.crc32(kind)
                  actual = zlib.crc32(payload, actual) & 0xffffffff
                  assert actual == expected, f'{name}: bad CRC in {kind!r}'
                  if kind == b'IHDR':
                      width, height, _, color_type = struct.unpack('>IIBB', payload[:10])
                  elif kind == b'tRNS':
                      has_trns = True
                  elif kind == b'IEND':
                      ended = True
                      break
                  pos = crc_end
              assert ended, f'{name}: missing IEND'
              assert width >= 1200 and height >= 1200, f'{name}: unexpectedly small {width}x{height}'
              assert width % 4 == 0 and height % 2 == 0, f'{name}: not divisible into a 4x2 atlas'
              has_alpha = color_type in (4, 6) or (color_type == 3 and has_trns)
              assert has_alpha, f'{name}: PNG has no transparency (type {color_type})'
              print(f'{name}: verified {width}x{height} transparent PNG, {len(data)} bytes')
          PY

      - name: Commit direct runtime PNG files
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/png/characters/leah-atlas.png assets/png/characters/moshe-atlas.png
          if git diff --cached --quiet; then
            echo 'Approved direct sprite PNGs are already current.'
          else
            git commit -m 'Install approved Leah and Moshé sprite PNGs directly'
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
