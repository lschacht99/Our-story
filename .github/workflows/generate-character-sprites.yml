name: Generate replacement character sprites

on:
  push:
    branches:
      - feature/replace-character-sprites-v2
    paths:
      - tools/generate_character_atlases.py
      - .github/workflows/generate-character-sprites.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/replace-character-sprites-v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install image renderer
        run: python -m pip install --disable-pip-version-check pillow==11.3.0
      - name: Generate transparent PNG atlases
        run: python tools/generate_character_atlases.py
      - name: Validate generated assets
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image
          for name in ('leah.png', 'moshe.png'):
              path=Path('assets/atlases')/name
              image=Image.open(path)
              assert image.format == 'PNG', image.format
              assert image.mode == 'RGBA', image.mode
              assert image.size == (1792, 2688), image.size
              assert image.getchannel('A').getextrema()[0] == 0
              print(name, image.size, path.stat().st_size)
          assert '.svg' not in Path('styles.css').read_text().lower()
          PY
      - name: Commit replacements to branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/atlases/leah.png assets/atlases/moshe.png game.js sw.js
          git diff --cached --quiet || git commit -m 'Replace Leah and Moshe with high-resolution PNG sprites'
          git push origin HEAD:feature/replace-character-sprites-v2
