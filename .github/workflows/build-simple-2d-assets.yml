name: Build simple 2D PNG assets

on:
  push:
    branches:
      - assets/simple-2d-png-pack
    paths:
      - tools/generate_2d_assets.py
      - data/characters.json
      - scripts/scene.js
      - scripts/dialogue.js
      - sprite-fix.css
      - index.html
      - sw.js
      - .github/workflows/build-simple-2d-assets.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: simple-2d-png-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out asset branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image tooling
        run: python -m pip install --disable-pip-version-check pillow

      - name: Generate finished PNG files
        run: python tools/generate_2d_assets.py

      - name: Validate JavaScript and repository rules
        run: |
          node --check scripts/scene.js
          node --check scripts/dialogue.js
          node tests/run-tests.mjs
          if find assets -type f \( -iname '*.svg' -o -iname '*.webp' -o -iname '*.pdf' \) -print -quit | grep -q .; then
            echo 'Non-PNG visual asset found under assets/' >&2
            exit 1
          fi

      - name: Commit generated PNG assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets index.html sprite-fix.css sw.js data/characters.json scripts/scene.js scripts/dialogue.js
          if git diff --cached --quiet; then
            echo 'No generated asset changes to commit.'
            exit 0
          fi
          git commit -m 'Generate simple 2D PNG game assets'
          git push origin HEAD:${GITHUB_REF_NAME}
